# 阿里云 DashScope — OpenAI 兼容模式（中国北京示例端点）。
# 官方 BASE_URL 与地域列表见：https://www.alibabacloud.com/help/en/model-studio/compatibility-of-openai-with-dashscope
# 密钥：环境变量 DASHSCOPE_API_KEY（勿提交明文）。
spring:
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          # 以 Model Studio 控制台模型名为准；此处为示例
          model: qwen3.5-plus
