# 共享配置。大模型厂商在 application-deepseek.yml / application-qwen.yml。
#
# 切换方式（任选其一）：
# - 环境变量：SPRING_PROFILES_ACTIVE=qwen,mysql,redis-vector
# - JVM 参数：--spring.profiles.active=qwen,mysql,redis-vector
# - 修改下方 spring.profiles.active 默认值
#
# DeepSeek 密钥：SPRING_AI_OPENAI_API_KEY
# 通义（DashScope）密钥：DASHSCOPE_API_KEY
# MySQL 配置：MYSQL_URL / MYSQL_USERNAME / MYSQL_PASSWORD
# Redis 配置：REDIS_HOST / REDIS_PORT / REDIS_PASSWORD
spring:
  application:
    name: spring-ai-lab
  profiles:
    active: qwen


  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://ys-dev-mysql.lai-ai.com:3306/db_mirror_medical?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${MYSQL_USERNAME:la_ys}
    password: ${MYSQL_PASSWORD:ys@123321}


  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s




mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto



logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"

resilience4j:
  retry:
    instances:
      externalPost:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - com.springailab.lab.external.ExternalPostException
  circuitbreaker:
    instances:
      externalPost:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

lab:
  chat:
    session:
      key-prefix: ${LAB_CHAT_SESSION_KEY_PREFIX:lab:chat:session:}
      max-messages: ${LAB_CHAT_SESSION_MAX_MESSAGES:20}
      ttl-seconds: ${LAB_CHAT_SESSION_TTL_SECONDS:3600}
  cost:
    price-per-1k-tokens:
      chat: ${LAB_CHAT_CHAT_PRICE_PER_1K_TOKENS:0}
      embedding: ${LAB_CHAT_EMBEDDING_PRICE_PER_1K_TOKENS:0}
  external:
    post:
      endpoints:
        weather:
          base-url: http://127.0.0.1:8080
          path: /mock/weather
        demo-echo:
          base-url: http://127.0.0.1:8080
          path:  /mock/demo-echo
        user-query:
          base-url: http://127.0.0.1:8080
          path: /api/users/username-query
        vector-search:
          base-url: http://127.0.0.1:8080
          path: /api/vector/search

  vector:
    redis:
      index-name: ${REDIS_VECTOR_INDEX:my_vector_index}
      vector-field: ${REDIS_VECTOR_FIELD:vec}
      content-field: ${REDIS_CONTENT_FIELD:content}
      top-k: ${REDIS_VECTOR_TOP_K:5}
      distance-metric: ${REDIS_DISTANCE_METRIC:COSINE}

